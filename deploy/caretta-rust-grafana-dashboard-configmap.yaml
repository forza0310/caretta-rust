        },
        "definition": "query_result(caretta_links_observed)",
        "includeAll": true,
        "label": "workload",
        "multi": true,
        "name": "workload",
        "options": [],
        "query": {
          "query": "query_result(caretta_links_observed)",
          "refId": "StandardVariableQuery"
        },
