          "gridPos": {
            "h": 8,
            "w": 7,
            "x": 17,
            "y": 7
          },
          "id": 8,
          "options": {
            "displayMode": "gradient",
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": false
            },
            "maxVizHeight": 300,
            "minVizHeight": 10,
            "minVizWidth": 0,
