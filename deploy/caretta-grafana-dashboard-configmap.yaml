apiVersion: v1
kind: ConfigMap
metadata:
  name: caretta-rust-grafana-dashboards
  labels:
    grafana_dashboard: "1"
data:
  default-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 24,
            "w": 17,
            "x": 0,
            "y": 0
          },
          "id": 2,
          "interval": "15s",
          "options": {
            "edges": {
              "mainStatUnit": "KiBs"
            },
            "layoutAlgorithm": "layered",
            "nodes": {
              "arcs": [
                {
                  "color": "#5794F2",
                  "field": "arc__color"
                }
              ],
              "mainStatUnit": "mbytes"
            },
            "zoomMode": "cooperative"
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "round(\n  increase(\n    (\n      sum by (id, title, subTitle, detail__kind, arc__color) (\n        label_replace(\n          (\n            label_join(label_join(label_join(label_join(${links_base}, \"detail__kind\", \"\", \"server_kind\"), \"subTitle\", \"\", \"server_namespace\"), \"title\", \"\", \"server_name\"), \"id\", \"\", \"server_id\")\n            or\n            label_join(label_join(label_join(label_join(${links_base}, \"detail__kind\", \"\", \"client_kind\"), \"subTitle\", \"\", \"client_namespace\"), \"title\", \"\", \"client_name\"), \"id\", \"\", \"client_id\")\n          ),\n          \"arc__color\", \"1\", \"link_id\", \"(.*)\"\n        )\n      )\n    )[$__range:$__interval]\n  )\n) / 1048576 > 0",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "nodes"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "(\n  rate(\n    (\n      (\n        sum by (id, source, target, detail__client_ip, detail__server_endpoint) (\n          label_join(label_join(label_join(label_join(label_join(${links_base}, \"source\", \"\", \"client_id\"), \"target\", \"\", \"server_id\"), \"id\", \"\", \"link_id\"), \"detail__client_ip\", \"\", \"client_ip\"), \"detail__server_endpoint\", \":\", \"server_ip\", \"server_port\")\n        )\n      )\n      and on(source)\n      sum by (source) (label_join(${links_base}, \"source\", \"\", \"client_id\"))\n      and on(target)\n      sum by (target) (label_join(${links_base}, \"target\", \"\", \"server_id\"))\n    )[$__range:$__interval]\n  ) / 1024\n) > 0",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "edges"
            }
          ],
          "title": "Service Map",
          "transformations": [
            {
              "id": "renameByRegex",
              "options": {
                "regex": "Value #nodes",
                "renamePattern": "MiB"
              }
            },
            {
              "id": "renameByRegex",
              "options": {
                "regex": "Value #edges",
                "renamePattern": "KiB/s"
              }
            }
          ],
          "type": "nodeGraph"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "fixedColor": "blue",
                "mode": "fixed"
              },
              "custom": {
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                }
              },
              "links": [],
              "mappings": [],
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 4,
            "x": 17,
            "y": 0
          },
          "id": 4,
          "options": {
            "displayLabels": [
              "name"
            ],
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "showLegend": false
            },
            "pieType": "donut",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "sort": "desc",
            "tooltip": {
              "hideZeros": false,
              "mode": "single",
              "sort": "none"
            }
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "round(sum by (server_port) (increase(${links_base}[$__range:$__interval]))) > 0",
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Active Ports",
          "type": "piechart"
        },
        {
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 3,
            "x": 21,
            "y": 0
