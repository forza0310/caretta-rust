apiVersion: v1
kind: ConfigMap
metadata:
  name: caretta-rust-grafana-dashboards
  labels:
    grafana_dashboard: "1"
data:
  default-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 24,
            "w": 17,
            "x": 0,
            "y": 0
          },
          "id": 2,
          "interval": "15s",
          "options": {
            "edges": {
              "mainStatUnit": "KiBs"
            },
            "layoutAlgorithm": "layered",
            "nodes": {
              "arcs": [
                {
                  "color": "#5794F2",
                  "field": "arc__color"
                }
              ],
              "mainStatUnit": "mbytes"
            },
            "zoomMode": "cooperative"
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "round(\n  increase(\n    (\n      sum by (id, title, subTitle, detail__kind, arc__color) (\n        label_replace(\n          (\n            label_join(label_join(label_join(label_join(${links_base}, \"detail__kind\", \"\", \"server_kind\"), \"subTitle\", \"\", \"server_namespace\"), \"title\", \"\", \"server_name\"), \"id\", \"\", \"server_id\")\n            or\n            label_join(label_join(label_join(label_join(${links_base}, \"detail__kind\", \"\", \"client_kind\"), \"subTitle\", \"\", \"client_namespace\"), \"title\", \"\", \"client_name\"), \"id\", \"\", \"client_id\")\n          ),\n          \"arc__color\", \"1\", \"link_id\", \"(.*)\"\n        )\n      )\n    )[$__range:$__interval]\n  )\n) / 1048576 > 0",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "nodes"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "(\n  rate(\n    (\n      (\n        sum by (id, source, target, detail__client_ip, detail__server_endpoint) (\n          label_join(label_join(label_join(label_join(label_join(${links_base}, \"source\", \"\", \"client_id\"), \"target\", \"\", \"server_id\"), \"id\", \"\", \"link_id\"), \"detail__client_ip\", \"\", \"client_ip\"), \"detail__server_endpoint\", \":\", \"server_ip\", \"server_port\")\n        )\n      )\n      and on(source)\n      sum by (source) (label_join(${links_base}, \"source\", \"\", \"client_id\"))\n      and on(target)\n      sum by (target) (label_join(${links_base}, \"target\", \"\", \"server_id\"))\n    )[$__range:$__interval]\n  ) / 1024\n) > 0",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "edges"
            }
          ],
          "description": "Kubernetes 工作负载之间的逐链路字节量,来自 caretta_links_observed(由 tcp_sendmsg + tcp_cleanup_rbuf 字节计数累加)。节点弧按 link_id 上色,边上的数值是该方向的 KiB/s。这是入口视图,异常点请下钻到下方的具体面板。同名节点自环表示 pod 内部流量;external / node 节点对应跨集群边界的流量。",
          "title": "Service Map",
          "transformations": [
            {
              "id": "renameByRegex",
              "options": {
                "regex": "Value #nodes",
                "renamePattern": "MiB"
              }
            },
            {
              "id": "renameByRegex",
              "options": {
                "regex": "Value #edges",
                "renamePattern": "KiB/s"
              }
            }
          ],
          "type": "nodeGraph"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "fixedColor": "blue",
                "mode": "fixed"
              },
              "custom": {
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                }
              },
              "links": [],
              "mappings": [],
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 4,
            "x": 17,
            "y": 0
          },
          "id": 4,
          "options": {
            "displayLabels": [
              "name"
            ],
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "showLegend": false
            },
            "pieType": "donut",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "sort": "desc",
            "tooltip": {
              "hideZeros": false,
              "mode": "single",
              "sort": "none"
            }
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "round(sum by (server_port) (increase(${links_base}[$__range:$__interval]))) > 0",
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            }
          ],
          "description": "按服务端口聚合所选时间窗内的总字节量。常用来发现意外开放的端口(调试端点、忘了关的 NodePort)或验证路由配置是否符合预期。底层是 increase(caretta_links_observed) 按 server_port 聚合,受当前 dashboard 过滤器约束。",
          "title": "Active Ports",
          "type": "piechart"
        },
        {
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 3,
            "x": 21,
            "y": 0
          },
          "id": 10,
          "options": {
            "code": {
              "language": "plaintext",
              "showLineNumbers": false,
              "showMiniMap": false
            },
            "content": "<table style=\"width:100%; height:100%;border:0px solid black;\">\n     <td style=\"text-align: center;vertical-align: middle;border:0px solid black; \">\n<div style=\"text-align: center\">\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/forza0310/caretta-rust/refs/heads/master/images/logo.png\" width=\"75%\" alt=\"caretta\" title=\"caretta\" />\n  <h4>by <a href=\"https://github.com/forza0310\">forza0310</h4>\n\n \n</div>\n</p>\n</div>\n</td>\n</table>\n",
            "mode": "markdown"
          },
          "pluginVersion": "12.4.4",
          "title": "",
          "type": "text"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "fixedColor": "purple",
                "mode": "continuous-blues"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              },
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 7,
            "x": 17,
            "y": 7
          },
          "id": 8,
          "options": {
            "displayMode": "gradient",
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": false
            },
            "maxVizHeight": 300,
            "minVizHeight": 10,
            "minVizWidth": 0,
            "namePlacement": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true,
            "sizing": "auto",
            "valueMode": "text"
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "topk(8, sum by (client_name) ((rate(caretta_links_observed{client_namespace=~\"$namespace\", client_kind=~\"$kind\", client_name=~\"$workload\", server_port=~\"$port\"}[$__range:$__interval]))))",
              "format": "time_series",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "A"
            }
          ],
          "description": "所选窗口内吞吐量(Bytes/s)最高的工作负载排行,按该负载作为 client 时参与的所有链路求和。只算它主动发出的字节量;想看它到底在跟谁说话,配合下方 Top Throughput Connections 看。",
          "title": "Top Throughput Workloads",
          "type": "bargauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-blues"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              },
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 7,
            "x": 17,
            "y": 15
          },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "horizontal",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "text": {},
            "textMode": "value_and_name",
            "wideLayout": true
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "topk(7, sum by (client_name, server_name) ( rate( (caretta_links_observed{client_namespace=~\"$namespace\", client_kind=~\"$kind\", client_name=~\"$workload\", server_port=~\"$port\", client_kind!~\"(node|external)\",} or caretta_links_observed{server_namespace=~\"$namespace\", server_kind=~\"$kind\", server_name=~\"$workload\", server_port=~\"$port\", server_kind!~\"(node|external)\"})[$__range:$__interval]) ) )",
              "format": "time_series",
              "instant": true,
              "legendFormat": "{{client_name}} ⮂ {{server_name}}",
              "range": false,
              "refId": "A"
            }
          ],
          "description": "所选窗口内吞吐量最高的 client→server 配对。底层字节计数与 Top Throughput Workloads 相同,但按方向性链路分组,适合定位最吵的一对一通信对。node / external 端点已过滤,聚焦集群内部流量;要看包含跨边界流量的全貌请回到 Service Map。",
          "title": "Top Throughput Connections",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 24
          },
          "id": 200,
          "panels": [],
          "title": "TCP Health (connection lifetime & retransmits)",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "description": "TCP 连接 lifetime 的 p50 / p95 / p99 分位,每次连接 close 时采样一次。按 client 侧过滤——集群内连接每个 role 视角各贡献一次样本。p50 与 p99 的差距反映尾部延迟:短连接(RPC 池)通常 ≤ 100ms,长连接(DB / 流式)爬到秒级以上。",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisColorMode": "text",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "log",
                  "log": 10
                },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                }
              },
              "mappings": [],
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 25
          },
          "id": 201,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "histogram_quantile(0.50, sum by (le) (rate(caretta_tcp_connection_lifetime_seconds_bucket{client_namespace=~\"$namespace\", client_kind=~\"$kind\", client_name=~\"$workload\", server_port=~\"$port\"}[$__rate_interval])))",
              "legendFormat": "p50",
              "range": true,
              "refId": "p50"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(caretta_tcp_connection_lifetime_seconds_bucket{client_namespace=~\"$namespace\", client_kind=~\"$kind\", client_name=~\"$workload\", server_port=~\"$port\"}[$__rate_interval])))",
              "legendFormat": "p95",
              "range": true,
              "refId": "p95"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "histogram_quantile(0.99, sum by (le) (rate(caretta_tcp_connection_lifetime_seconds_bucket{client_namespace=~\"$namespace\", client_kind=~\"$kind\", client_name=~\"$workload\", server_port=~\"$port\"}[$__rate_interval])))",
              "legendFormat": "p99",
              "range": true,
              "refId": "p99"
            }
          ],
          "title": "TCP Connection Lifetime (p50 / p95 / p99)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "description": "close 时刻 lifetime 在各桶上的分布随时间演化。短端(底部)亮带 = RPC / 健康探测;长端(顶部)亮带 = 持久连接。亮带突然在桶之间迁移通常意味着重试增多或连接池洗牌。",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "scaleDistribution": {
                  "type": "linear"
                }
              },
              "unit": "suffix: count"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 25
          },
          "id": 202,
          "options": {
            "calculate": false,
            "cellGap": 1,
            "color": {
              "exponent": 0.25,
              "fill": "dark-orange",
              "min": 1,
              "mode": "scheme",
              "reverse": false,
              "scale": "exponential",
              "scheme": "RdYlBu",
              "steps": 128
            },
            "exemplars": {
              "color": "rgba(255,0,255,0.7)"
            },
            "filterValues": {
              "le": 1e-9
            },
            "legend": {
              "show": true
            },
            "rowsFrame": {
              "layout": "auto",
              "value": "Lifetime"
            },
            "tooltip": {
              "mode": "single",
              "showColorScale": false,
              "yHistogram": false
            },
            "yAxis": {
              "axisPlacement": "left",
              "reverse": false,
              "unit": "s"
            }
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "sum by (le) (increase(caretta_tcp_connection_lifetime_seconds_bucket{client_namespace=~\"$namespace\", client_kind=~\"$kind\", client_name=~\"$workload\", server_port=~\"$port\"}[$__rate_interval]))",
              "format": "heatmap",
              "legendFormat": "{{le}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Connection Lifetime Distribution",
          "type": "heatmap"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "description": "系统总体 TCP 重传速率(pps),按 dashboard 当前选区聚合所有 client→server 链路求和。目前只关注 client 视角的重传,server 出方向重传未统计。突发尖峰通常对应链路拥塞或对端短时不可达;持续抬高建议结合吞吐和重传率(retransmits / segs)综合判断。",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisColorMode": "text",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                }
              },
              "mappings": [],
              "unit": "pps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 33
          },
          "id": 203,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max",
                "sum"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "sum( rate(caretta_tcp_retransmits_total{client_namespace=~\"$namespace\", client_kind=~\"$kind\", client_name=~\"$workload\", server_port=~\"$port\"}[$__rate_interval]) or rate(caretta_tcp_retransmits_total{server_namespace=~\"$namespace\", server_kind=~\"$kind\", server_name=~\"$workload\", server_port=~\"$port\"}[$__rate_interval]) )",
              "legendFormat": "retransmits",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "TCP Retransmit Rate (system total)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "description": "所选窗口内重传量最高的 client→server 配对。底层为 tcp_retransmit_skb 上报的 segs 计数;重传 / 吞吐占比高的配对最值得查。目前只关注 client 视角的重传,server 出方向重传未统计。包含 node / external 跨边界连接。",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-blues"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 33
          },
          "id": 204,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "horizontal",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "text": {},
            "textMode": "value_and_name",
            "wideLayout": true
          },
          "pluginVersion": "12.4.4",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "topk(7, sum by (client_name, server_name) ( increase(caretta_tcp_retransmits_total{client_namespace=~\"$namespace\", client_kind=~\"$kind\", client_name=~\"$workload\", server_port=~\"$port\"}[$__range]) or increase(caretta_tcp_retransmits_total{server_namespace=~\"$namespace\", server_kind=~\"$kind\", server_name=~\"$workload\", server_port=~\"$port\"}[$__range]) ) ) > 0",
              "format": "time_series",
              "instant": true,
              "legendFormat": "{{client_name}} → {{server_name}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Top Retransmitting Connections",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 41
          },
          "id": 210,
          "panels": [],
          "title": "TCP Latency & Packet Rate (srtt / segs)",
          "type": "row"
